<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>모임시간 — 일정 조율 보드</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800;900&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet" />
<style>
:root{
  --navy:#14263F; --navy-deep:#0C1829; --navy-mid:#1F3A5C;
  --green:#1DA36A; --green-dark:#14804F; --green-tint:#E1F3EA;
  --white:#FFFFFF; --off:#F4F7F9; --line:#E2E8EE;
  --gray:#5B6B7E; --gray-l:#93A2B3; --danger:#C4453A;
}
*{box-sizing:border-box}
body{margin:0;background:var(--off);color:var(--navy);font-family:'Noto Sans KR',-apple-system,sans-serif;-webkit-font-smoothing:antialiased}
::selection{background:var(--green-tint)}
button{font-family:inherit}
input,select,textarea{width:100%;padding:10px 12px;font-size:14.5px;font-family:inherit;border:1.5px solid var(--line);border-radius:10px;background:var(--white);color:var(--navy);outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--green);box-shadow:0 0 0 3px var(--green-tint)}
label.field{display:block;margin-bottom:16px}
label.field>.lbl{font-size:12.5px;font-weight:700;color:var(--navy);margin-bottom:6px}
label.field>.hint{font-size:12px;color:var(--gray-l);margin-top:5px}
.btn{font-weight:700;font-size:14.5px;padding:11px 20px;border-radius:10px;border:1.5px solid transparent;cursor:pointer;letter-spacing:-.01em;transition:transform .08s ease}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn.sm{font-size:13px;padding:7px 14px}
.btn.primary{background:var(--green);color:var(--white)}
.btn.navy{background:var(--navy);color:var(--white)}
.btn.ghost{background:transparent;color:var(--navy);border-color:var(--line)}
.btn.ghost.on-navy{border-color:var(--navy-mid);color:#D3DEEA}
.btn.ghost.danger-navy{border-color:var(--navy-mid);color:#F0B4AE}
header.top{background:var(--navy);color:var(--white);padding:0 20px}
header.top .inner{max-width:1080px;margin:0 auto;height:60px;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:baseline;gap:10px;cursor:pointer}
.logo b{font-weight:900;font-size:19px;letter-spacing:-.03em}
.logo b span{color:var(--green)}
.logo small{font-size:11.5px;color:#8FA5BE;font-weight:500}
main{max-width:1080px;margin:0 auto;padding:28px 20px 80px}
main.narrow{max-width:760px}
.card-box{background:var(--white);border:1.5px solid var(--line);border-radius:18px;padding:28px 26px;max-width:480px;margin:30px auto 0}
.card-box h2{margin:0;font-size:20px;font-weight:900;letter-spacing:-.03em}
.card-box .sub{color:var(--gray);font-size:13.5px;line-height:1.6;margin:8px 0 22px;white-space:pre-line}
.row{display:flex;gap:10px;justify-content:flex-end;margin-top:8px}
.err{color:var(--danger);font-size:13px;font-weight:600;margin-bottom:12px}
.code-chip{font-family:'IBM Plex Mono',ui-monospace,monospace;font-size:13.5px;font-weight:600;letter-spacing:.18em;color:var(--green);background:var(--green-tint);border:1.5px dashed var(--green);border-radius:8px;padding:4px 10px;cursor:pointer;transition:all .15s}
.code-chip.big{font-size:20px;padding:8px 16px}
.code-chip.copied{background:var(--green);color:var(--white)}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:var(--navy-deep);color:var(--white);padding:11px 22px;border-radius:12px;font-size:13.5px;font-weight:600;box-shadow:0 8px 24px rgba(12,24,41,.35);z-index:200;opacity:0;transition:opacity .2s}
.toast.show{opacity:1}
/* landing */
.hero-eyebrow{font-size:12px;font-weight:800;color:var(--green);letter-spacing:.14em;margin-bottom:10px}
.hero h1{font-size:32px;font-weight:900;letter-spacing:-.04em;line-height:1.25;margin:0}
.hero p{color:var(--gray);font-size:15px;line-height:1.7;margin-top:14px;max-width:520px}
.entry-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px}
.entry{border-radius:18px;padding:26px 24px;cursor:pointer}
.entry .ico{font-size:22px;margin-bottom:10px}
.entry .t{font-size:18px;font-weight:800;margin-bottom:6px}
.entry .d{font-size:13.5px;line-height:1.6}
.entry.owner{background:var(--navy);color:var(--white);box-shadow:0 10px 30px rgba(20,38,63,.25)}
.entry.owner .d{color:#AFC3DA}
.entry.join{background:var(--white);border:1.5px solid var(--line)}
.entry.join .d{color:var(--gray)}
/* dashboard */
.dash-head{display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:22px}
.dash-head h1{font-size:24px;font-weight:900;letter-spacing:-.03em;margin:0}
.dash-head p{color:var(--gray);font-size:13.5px;margin:6px 0 0}
.url-bar{background:var(--white);border:1.5px solid var(--line);border-radius:14px;padding:14px 18px;margin-bottom:24px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.url-bar .t{font-size:13px;font-weight:800;white-space:nowrap}
.url-bar .v{font-size:13px;font-weight:600;flex:1;min-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
.ev-card{background:var(--white);border:1.5px solid var(--line);border-left:5px solid var(--navy);border-radius:14px;padding:18px 18px 16px;cursor:pointer;transition:box-shadow .15s}
.ev-card:hover{box-shadow:0 6px 20px rgba(20,38,63,.12)}
.ev-card .head{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.ev-card .title{font-size:16.5px;font-weight:800;letter-spacing:-.02em;line-height:1.35}
.ev-card .range{font-size:12.5px;color:var(--gray);margin-top:8px;font-variant-numeric:tabular-nums}
.chips{margin-top:12px;display:flex;gap:6px;flex-wrap:wrap}
.chip{font-size:11.5px;font-weight:700;background:var(--green-tint);color:var(--green-dark);border-radius:20px;padding:3px 10px}
.empty{text-align:center;padding:60px 20px;background:var(--white);border:1.5px dashed var(--line);border-radius:18px;color:var(--gray)}
.note{font-size:12px;color:var(--gray-l);line-height:1.7;margin-top:28px}
/* editor */
.editor-wrap{max-width:560px;margin:0 auto}
.editor-wrap h1{font-size:22px;font-weight:900;letter-spacing:-.03em}
.editor-box{background:var(--white);border:1.5px solid var(--line);border-radius:18px;padding:24px 24px 20px;margin-top:14px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.inv-row{display:flex;align-items:center;gap:10px;background:var(--off);border-radius:10px;padding:8px 12px;margin-bottom:6px}
.inv-row .n{font-weight:800;font-size:13.5px}
.inv-row .e{font-size:12.5px;color:var(--gray);flex:1;overflow:hidden;text-overflow:ellipsis}
.inv-row .x{border:none;background:transparent;color:var(--gray-l);cursor:pointer;font-size:15px}
/* detail */
.back-link{background:none;border:none;color:var(--gray);font-size:13px;cursor:pointer;padding:0;margin-bottom:14px}
.detail-hero{background:var(--navy);color:var(--white);border-radius:18px;padding:24px 26px;display:flex;flex-wrap:wrap;gap:16px;align-items:center;justify-content:space-between}
.detail-hero .title{font-size:21px;font-weight:900;letter-spacing:-.03em}
.detail-hero .range{font-size:13px;color:#AFC3DA;margin-top:6px;font-variant-numeric:tabular-nums}
.detail-hero .desc{font-size:13px;color:#D3DEEA;margin-top:8px;max-width:520px;line-height:1.6}
.detail-hero .right{display:flex;flex-direction:column;align-items:flex-end;gap:10px}
.detail-hero .cap{font-size:11px;color:#8FA5BE;font-weight:700;letter-spacing:.08em}
section.blk{margin-top:26px}
.blk-head{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:12px}
.blk-head h2{font-size:16.5px;font-weight:900;margin:0}
.warn{background:#FFF7E8;border:1.5px solid #F0DDB0;border-radius:12px;padding:10px 14px;font-size:12.5px;color:#8A6A1F;margin-bottom:12px}
.inv-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px}
.inv-card{background:var(--white);border:1.5px solid var(--line);border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:10px}
.inv-card.done{border-color:var(--green)}
.dot{width:8px;height:8px;border-radius:4px;background:var(--gray-l);flex-shrink:0}
.inv-card.done .dot{background:var(--green)}
.inv-card .info{flex:1;min-width:0}
.inv-card .n{font-weight:800;font-size:13.5px}
.inv-card .n .ok{color:var(--green);font-size:11.5px}
.inv-card .e{font-size:12px;color:var(--gray);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mail-one{border:none;background:transparent;cursor:pointer;font-size:16px;padding:2px}
.pchips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.pchip{font-size:12.5px;font-weight:800;padding:6px 14px;border-radius:20px;cursor:pointer;border:1.5px solid var(--line);background:var(--white);color:var(--navy)}
.pchip.on{border-color:var(--navy);background:var(--navy);color:var(--white)}
.best{margin-top:16px;background:var(--green-tint);border:1.5px solid var(--green);border-radius:14px;padding:14px 18px}
.best .t{font-size:12.5px;font-weight:900;color:var(--green-dark);margin-bottom:8px}
.best .items{display:flex;gap:14px;flex-wrap:wrap;font-size:13.5px;font-weight:800}
.best .items b{color:var(--green-dark)}
/* time grid */
.tg-wrap{overflow-x:auto;border-radius:14px;border:1.5px solid var(--line);background:var(--white)}
.tg{user-select:none}
.tg .r{display:grid}
.tg .h-corner{background:var(--navy)}
.tg .h-day{background:var(--navy);color:var(--white);text-align:center;padding:10px 4px 8px;border-left:1px solid var(--navy-mid)}
.tg .h-day .dow{font-size:11px;font-weight:600;color:#AFC3DA}
.tg .h-day.we .dow{color:#8FD9B6}
.tg .h-day .dt{font-size:15px;font-weight:800;font-variant-numeric:tabular-nums}
.tg .t-lab{background:var(--navy-deep);color:#AFC3DA;font-size:11px;font-weight:600;font-variant-numeric:tabular-nums;text-align:right;padding:2px 8px 0 0;height:26px}
.tg .t-lab.hr{border-top:1px solid var(--navy-mid)}
.tg .cell{height:26px;background:var(--white);border-left:1px solid var(--line);border-top:1px dashed #EDF1F5;display:flex;align-items:center;justify-content:center;font-size:10.5px;font-weight:800;font-variant-numeric:tabular-nums}
.tg .cell.hr{border-top:1px solid var(--line)}
.tg.edit .cell{cursor:pointer;touch-action:none}
.tg .cell.sel{background:var(--green)}
.tg .cell.hl{outline:2.5px solid var(--navy);outline-offset:-2.5px}
.tip{background:var(--green-tint);border-radius:12px;padding:10px 16px;font-size:12.5px;color:var(--green-dark);font-weight:700;margin-bottom:14px}
.tip u{text-underline-offset:2px}
/* modal */
.overlay{position:fixed;inset:0;background:rgba(12,24,41,.55);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:var(--white);border-radius:18px;width:100%;max-width:620px;max-height:90vh;overflow-y:auto;padding:24px 24px 20px;box-shadow:0 24px 60px rgba(12,24,41,.35)}
.modal .m-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.modal h3{margin:0;font-size:18px;font-weight:900;letter-spacing:-.03em}
.m-close{border:none;background:transparent;font-size:20px;color:var(--gray-l);cursor:pointer}
.rc-head{font-size:12.5px;font-weight:700;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.rc-head label{display:flex;align-items:center;gap:6px;cursor:pointer;color:var(--green-dark);width:auto}
.rc-head input{width:15px;height:15px;accent-color:var(--green);padding:0}
.rc-list{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px;max-height:130px;overflow-y:auto;padding:2px}
.rc{font-size:12.5px;font-weight:800;padding:6px 13px;border-radius:20px;cursor:pointer;border:1.5px solid var(--line);background:var(--white);color:var(--gray)}
.rc.on{border-color:var(--green);background:var(--green-tint);color:var(--green-dark)}
.m-note{font-size:11.5px;color:var(--gray-l);line-height:1.6;margin-bottom:14px}
/* participant grid header */
.pg-head{display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:16px}
.pg-head h1{font-size:21px;font-weight:900;letter-spacing:-.03em;margin:0}
.pg-head .range{font-size:13px;color:var(--gray);margin-top:6px;font-variant-numeric:tabular-nums}
.pg-head .desc{font-size:13px;color:var(--gray);margin-top:4px;line-height:1.6;max-width:560px}
.pg-head .right{text-align:right}
.pg-head .cnt{font-size:12px;color:var(--gray);margin-bottom:8px}
.pg-head .cnt b{color:var(--green)}
.local-banner{background:#EEF4FB;border:1.5px solid #C9DAF0;border-radius:12px;padding:10px 16px;font-size:12px;color:#3D5D85;margin-bottom:20px;line-height:1.6}
@media (prefers-reduced-motion:reduce){*{transition:none!important}}
@media (max-width:560px){.hero h1{font-size:26px}.grid2{grid-template-columns:1fr}}
</style>
</head>
<body>
<header class="top"><div class="inner">
  <div class="logo" id="logo"><b>모임<span>시간</span></b><small>일정 조율 보드</small></div>
  <div id="hdr-right" style="display:flex;align-items:center;gap:12px"></div>
</div></header>
<main id="main" class="narrow"></main>
<div class="toast" id="toast"></div>

<script>
/* ───────── storage adapter: Claude cloud storage ▸ localStorage fallback ───────── */
const hasCloud = typeof window.storage === "object" && window.storage && typeof window.storage.get === "function";
const store = {
  async get(key, shared) {
    if (hasCloud) { try { const r = await window.storage.get(key, shared); return r ? JSON.parse(r.value) : null; } catch { return null; } }
    try { const v = localStorage.getItem("mt-" + key); return v ? JSON.parse(v) : null; } catch { return null; }
  },
  async set(key, val, shared) {
    if (hasCloud) { try { return !!(await window.storage.set(key, JSON.stringify(val), shared)); } catch { return false; } }
    try { localStorage.setItem("mt-" + key, JSON.stringify(val)); return true; } catch { return false; }
  },
  async del(key, shared) {
    if (hasCloud) { try { await window.storage.delete(key, shared); } catch {} return; }
    try { localStorage.removeItem("mt-" + key); } catch {}
  },
};
const APP_KEY = "app-v1", ID_KEY = "identity-v1";
const respKey = (id) => "resp-" + id;

/* ───────── utils ───────── */
const $ = (s, r) => (r || document).querySelector(s);
const $$ = (s, r) => [...(r || document).querySelectorAll(s)];
const esc = (s) => String(s ?? "").replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
const uid = () => Math.random().toString(36).slice(2, 8) + Date.now().toString(36).slice(-4);
const makeCode = () => { const c = "ABCDEFGHJKMNPQRSTUVWXYZ23456789"; let s = ""; for (let i = 0; i < 6; i++) s += c[(Math.random() * c.length) | 0]; return s; };
const DOW = ["일","월","화","수","목","금","토"];
const addDays = (iso, n) => { const d = new Date(iso + "T00:00:00"); d.setDate(d.getDate() + n); return d; };
const toISO = (d) => d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
const fmtHM = (dec) => Math.floor(dec) + ":" + (dec % 1 ? "30" : "00");
const fmtRange = (ev) => { const a = addDays(ev.startDate, 0), b = addDays(ev.startDate, ev.days - 1);
  return `${a.getMonth()+1}월 ${a.getDate()}일 – ${b.getMonth()+1}월 ${b.getDate()}일 · ${fmtHM(ev.hourStart)}–${fmtHM(ev.hourEnd)}`; };
const slotLabel = (ev, slot) => { const [di, si] = slot.split("-").map(Number); const d = addDays(ev.startDate, di);
  const tm = Math.round(ev.hourStart * 60) + si * 30, h = (tm / 60) | 0, m = tm % 60 ? "30" : "00";
  return `${d.getMonth()+1}/${d.getDate()}(${DOW[d.getDay()]}) ${h}:${m}`; };
let toastTimer;
function toast(msg) { const t = $("#toast"); t.textContent = msg; t.classList.add("show"); clearTimeout(toastTimer); toastTimer = setTimeout(() => t.classList.remove("show"), 2200); }
function copyText(t) { if (navigator.clipboard?.writeText) return navigator.clipboard.writeText(t); return Promise.reject(); }

/* ───────── state ───────── */
let S = {
  view: "loading",
  app: { ownerPin: null, siteUrl: "", events: [] },
  identity: null,
  activeId: null,          // event id in detail/grid
  editing: null,           // editor working copy
  resp: null,              // detail: responses object
  highlightEmail: null,
  mySlots: new Set(),      // participant selection
  dirty: false,
  composer: null,          // { preselect:[emails] }
};
const activeEvent = () => S.app.events.find((e) => e.id === S.activeId) || null;

async function saveApp(next) { S.app = next; const ok = await store.set(APP_KEY, next, true); if (!ok) toast("저장에 실패했어요. 다시 시도해 주세요."); return ok; }
async function saveIdentity(id) { S.identity = id; await store.set(ID_KEY, id, false); }

/* ───────── boot ───────── */
(async function boot() {
  render();
  const [a, id] = await Promise.all([store.get(APP_KEY, true), store.get(ID_KEY, false)]);
  if (a) S.app = a;
  if (id) S.identity = id;
  if (id?.role === "owner" && a?.ownerPin) S.view = "dash";
  else if (id?.role === "participant") S.view = "joinCode";
  else S.view = "landing";
  render();
})();

function go(view) { S.view = view; render(); }
async function logout() { S.identity = null; await store.set(ID_KEY, null, false); go("landing"); }

/* ───────── render root ───────── */
function render() {
  // header right
  const hr = $("#hdr-right");
  if (S.identity) {
    hr.innerHTML = `<span style="font-size:12.5px;color:#AFC3DA">${S.identity.role === "owner" ? "관리자" : esc(S.identity.name) + "님"}</span>
      <button id="btn-logout" style="background:transparent;border:1px solid var(--navy-mid);color:#AFC3DA;border-radius:8px;padding:5px 12px;font-size:12px;cursor:pointer">나가기</button>`;
    $("#btn-logout").onclick = logout;
  } else hr.innerHTML = "";
  $("#logo").onclick = () => go(S.identity?.role === "owner" ? "dash" : S.identity?.role === "participant" ? "joinCode" : "landing");

  const main = $("#main");
  const wide = ["dash", "detail", "grid"].includes(S.view);
  main.className = wide ? "" : "narrow";

  const views = { loading: vLoading, landing: vLanding, ownerSetup: vOwnerSetup, ownerLogin: vOwnerLogin,
    dash: vDash, editor: vEditor, detail: vDetail, joinCode: vJoinCode, joinIdentity: vJoinIdentity, grid: vGrid };
  (views[S.view] || vLanding)(main);

  renderComposer();
}

const localBanner = hasCloud ? "" :
  `<div class="local-banner">ℹ️ 지금은 이 브라우저에만 데이터가 저장되는 <b>로컬 모드</b>예요. 여러 사람이 각자 기기에서 응답을 공유하려면 Claude에서 이 앱을 게시(공유 링크)해 사용하거나 서버에 연동해야 해요.</div>`;

/* ───────── views ───────── */
function vLoading(m) { m.innerHTML = `<div style="text-align:center;padding:80px 0;color:var(--gray)">불러오는 중…</div>`; }

function vLanding(m) {
  m.innerHTML = `
  ${localBanner}
  <div class="hero" style="padding:36px 0 30px">
    <div class="hero-eyebrow">SCHEDULE BOARD</div>
    <h1>면접·미팅 시간,<br/>모두의 가능한 칸을 모아서 정하세요</h1>
    <p>안건마다 일정 카드를 만들고, 초대한 사람만 초대 코드로 들어와 희망 시간대를 표시합니다. 모두의 응답은 관리자만 볼 수 있어요.</p>
  </div>
  <div class="entry-grid">
    <div class="entry owner" id="e-owner">
      <div class="ico">🗂️</div><div class="t">관리자로 시작</div>
      <div class="d">일정 카드를 만들고 사람들을 초대해요.${S.app.ownerPin ? " (PIN으로 로그인)" : " 처음이라면 관리자 PIN을 설정합니다."}</div>
    </div>
    <div class="entry join" id="e-join">
      <div class="ico">✉️</div><div class="t">초대받아 참여</div>

function bindCodeChips(root) {
  $$(".code-chip", root).forEach((el) => el.addEventListener("click", (e) => {
    e.stopPropagation();
    copyText(el.dataset.code).then(() => {
      el.classList.add("copied"); const t = el.textContent; el.textContent = "복사됨 ✓";

    }).catch(() => {});
  }));
}

/* ───────── editor ───────── */
function vEditor(m) {
  if (!S.editing) {
    const init = S.activeId && S.view === "editor" && S._editFromDetail ? activeEvent() : null;
    const today = toISO(new Date());
    S.editing = init
      ? { ...init, invitees: [...init.invitees], endDate: init.endDate || toISO(addDays(init.startDate, init.days - 1)) }
      : { id: uid(), code: makeCode(), title: "", desc: "", startDate: today, endDate: toISO(addDays(today, 4)), days: 5, hourStart: 9, hourEnd: 18, invitees: [], createdAt: Date.now(), _new: true };
  }
  const f = S.editing;
  const timeOpts = (endMode) => Array.from({ length: 48 }, (_, i) => endMode ? (i + 1) / 2 : i / 2)
    .map((t) => `<option value="${t}" ${t === (endMode ? f.hourEnd : f.hourStart) ? "selected" : ""}>${fmtHM(t)}</option>`).join("");

  m.innerHTML = `
  <div class="editor-wrap">
    <h1>${f._new ? "새 일정 카드" : "일정 카드 수정"}</h1>
    <div class="editor-box">
      <label class="field"><div class="lbl">안건 제목</div><input id="f-title" value="${esc(f.title)}" placeholder="예: OOO 면접 일정, XXX 킥오프 미팅"/></label>
      <label class="field"><div class="lbl">설명 (선택)</div><textarea id="f-desc" style="min-height:64px;resize:vertical" placeholder="참여자에게 보여줄 안내">${esc(f.desc)}</textarea></label>
      <div class="grid2">
        <label class="field"><div class="lbl">시작 날짜</div><input type="date" id="f-start" value="${f.startDate}"/></label>
        <label class="field"><div class="lbl">종료 날짜</div><input type="date" id="f-end" value="${f.endDate}" min="${f.startDate}"/></label>
        <label class="field"><div class="lbl">시작 시간</div><select id="f-hs">${timeOpts(false)}</select></label>
        <label class="field"><div class="lbl">종료 시간</div><select id="f-he">${timeOpts(true)}</select></label>
      </div>
      <label class="field"><div class="lbl">초대 인원</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <input id="p-name" placeholder="이름" style="flex:1 1 110px"/>
          <input id="p-email" placeholder="email@example.com" style="flex:2 1 180px"/>
          <button class="btn navy sm" id="p-add" style="align-self:stretch">추가</button>
        </div>
        <div class="hint">여기 등록된 이메일만 이 카드에 응답할 수 있어요.</div>
      </label>
      <div id="inv-list">${f.invitees.map((p, i) => `
        <div class="inv-row"><span class="n">${esc(p.name)}</span><span class="e">${esc(p.email)}</span><button class="x" data-i="${i}">✕</button></div>`).join("")}</div>
      <div class="err" id="err" hidden></div>
      <div class="row"><button class="btn ghost" id="cancel">취소</button><button class="btn primary" id="save">${f._new ? "카드 만들기" : "저장"}</button></div>
    </div>
  </div>`;

  const err = (msg) => { const e = $("#err"); e.hidden = !msg; e.textContent = msg || ""; };
  const syncFields = () => { f.title = $("#f-title").value; f.desc = $("#f-desc").value; f.startDate = $("#f-start").value; f.endDate = $("#f-end").value; f.hourStart = +$("#f-hs").value; f.hourEnd = +$("#f-he").value; };

  const addInvitee = () => {
    syncFields();
    const name = $("#p-name").value.trim(), email = $("#p-email").value.trim().toLowerCase();
    if (!name || !/^\S+@\S+\.\S+$/.test(email)) return err("이름과 올바른 이메일을 입력해 주세요.");
    if (f.invitees.some((p) => p.email === email)) return err("이미 추가된 이메일이에요.");
    f.invitees.push({ name, email }); err(""); render();
  };
  $("#p-add").onclick = addInvitee;
  $("#p-email").addEventListener("keydown", (e) => e.key === "Enter" && addInvitee());
  $$("#inv-list .x", m).forEach((b) => b.addEventListener("click", () => { syncFields(); f.invitees.splice(+b.dataset.i, 1); render(); }));
  $("#f-start").addEventListener("change", () => { $("#f-end").min = $("#f-start").value; });
  $("#cancel").onclick = () => { S.editing = null; S._editFromDetail = false; go(f._new ? "dash" : "detail"); };
  $("#save").onclick = async () => {
    syncFields();
    if (!f.title.trim()) return err("안건 제목을 입력해 주세요.");
    if (!f.startDate || !f.endDate) return err("시작 날짜와 종료 날짜를 모두 선택해 주세요.");
    const diff = Math.round((new Date(f.endDate + "T00:00:00") - new Date(f.startDate + "T00:00:00")) / 86400000);
    if (diff < 0) return err("종료 날짜가 시작 날짜보다 빠를 수 없어요.");
    if (diff > 13) return err("기간은 최대 14일까지 설정할 수 있어요.");
    if (f.hourEnd <= f.hourStart) return err("종료 시간이 시작 시간보다 늦어야 해요.");
    const ev = { ...f, title: f.title.trim(), days: diff + 1 }; delete ev._new;
    const exists = S.app.events.some((e) => e.id === ev.id);
    const events = exists ? S.app.events.map((e) => (e.id === ev.id ? ev : e)) : [ev, ...S.app.events];
    if (await saveApp({ ...S.app, events })) {
      S.activeId = ev.id; S.editing = null; S._editFromDetail = false; S.resp = null;
      toast(exists ? "일정 카드를 수정했어요" : "일정 카드를 만들었어요"); go("detail");
    }
  };
}

  const counts = {}; responders.forEach((r) => r.slots.forEach((s) => (counts[s] = (counts[s] || 0) + 1)));
  const best = Object.entries(counts).sort((a, b) => b[1] - a[1]).slice(0, 3);
  const hlSet = S.highlightEmail && S.resp?.[S.highlightEmail] ? new Set(S.resp[S.highlightEmail].slots) : null;

  <section class="blk">
    <div class="blk-head">

      ${ev.invitees.length ? `<button class="btn primary sm" id="mail-all">✉️ 요청 메일 작성</button>` : ""}
    </div>
    ${!S.app.siteUrl ? `<div class="warn">사이트 링크가 아직 설정되지 않아 메일 본문에 접속 주소가 빠져요. 대시보드에서 이 웹사이트 주소를 등록해 주세요.</div>` : ""}

      <div class="inv-card ${done ? "done" : ""}"><div class="dot"></div>
        <div class="info"><div class="n">${esc(p.name)} ${done ? `<span class="ok">· 응답 ${r.slots.length}칸</span>` : ""}</div><div class="e">${esc(p.email)}</div></div>
        <button class="mail-one" data-email="${esc(p.email)}" title="이 사람에게 요청 메일 작성">✉️</button>
      </div>`; }).join("")}
      ${ev.invitees.length === 0 ? `<div style="color:var(--gray-l);font-size:13.5px">초대 인원이 없어요. <b>수정</b>에서 추가하세요.</div>` : ""}
    </div>
  </section>

  <section class="blk">
    <div class="blk-head">
      <h2>응답 현황 <span style="color:var(--green)">${responders.length}</span><span style="color:var(--gray-l);font-weight:700">/${ev.invitees.length}</span>
        <span style="font-size:11.5px;color:var(--gray-l);font-weight:600;margin-left:10px">관리자만 볼 수 있는 화면</span></h2>
      <button class="btn ghost sm" id="refresh">↻ 새로고침</button>
    </div>
    <div id="resp-area">
      ${S.resp === null ? `<div style="color:var(--gray);padding:20px">응답 불러오는 중…</div>`
      : responders.length === 0 ? `<div class="empty" style="padding:36px 20px;font-size:13.5px">아직 등록된 응답이 없어요. 요청 메일을 보내고 잠시 후 새로고침해 보세요.</div>`
      : `
      <div class="pchips">
        <button class="pchip ${!S.highlightEmail ? "on" : ""}" data-em="">전체 보기</button>
        ${responders.map((r) => `<button class="pchip ${S.highlightEmail === r.email ? "on" : ""}" data-em="${esc(r.email)}">${esc(r.name)}</button>`).join("")}
      </div>
      ${gridHTML(ev, { mode: "heat", counts, total: responders.length, hlSet })}
      ${best.length ? `<div class="best"><div class="t">🏆 겹치는 시간 TOP ${best.length}</div>

  $("#c-body", ov).addEventListener("input", (e) => (S.composer.body = e.target.value));
  const rerender = () => { S.composer.subject = $("#c-subject", ov).value; S.composer.body = $("#c-body", ov).value; renderComposer(); };
  $("#c-all", ov).addEventListener("change", (e) => { S.composer.selected = e.target.checked ? new Set(ev.invitees.map((p) => p.email)) : new Set(); rerender(); });
  $$(".rc", ov).forEach((b) => b.addEventListener("click", () => {
    const em = b.dataset.em; selected.has(em) ? selected.delete(em) : selected.add(em); rerender();
  }));
  $("#c-send", ov).onclick = () => {
    const emails = ev.invitees.filter((p) => selected.has(p.email)).map((p) => p.email);
    if (!emails.length) return;
    const q = `subject=${encodeURIComponent($("#c-subject", ov).value)}&body=${encodeURIComponent($("#c-body", ov).value)}`;
    const href = emails.length === 1 ? `mailto:${emails[0]}?${q}` : `mailto:?bcc=${encodeURIComponent(emails.join(","))}&${q}`;
    const w = window.open(href, "_blank"); if (!w) window.location.href = href;
    S.composer = null; renderComposer(); toast(`${emails.length}명에게 보낼 메일을 메일 앱으로 넘겼어요 ✓`);
  };
}

/* ───────── participant: join ───────── */
function vJoinCode(m) {
  m.innerHTML = `
  ${localBanner}
  <div class="card-box">
    <h2>초대 코드 입력</h2>
    <div class="sub">메일로 받은 6자리 초대 코드를 입력하면 해당 안건의 시간표로 이동해요.</div>
    <label class="field"><div class="lbl">초대 코드</div>
      <input id="code" maxlength="6" placeholder="ABC123" autofocus
        style="font-family:'IBM Plex Mono',monospace;letter-spacing:.25em;text-align:center;font-size:18px;text-transform:uppercase"/></label>
    <div class="err" id="err" hidden></div>
    <div class="row">${S.identity ? "" : `<button class="btn ghost" id="back">뒤로</button>`}<button class="btn primary" id="ok">다음</button></div>
  </div>`;
  const el = $("#code");
  el.addEventListener("input", () => (el.value = el.value.toUpperCase().replace(/[^A-Z0-9]/g, "")));
  const submit = () => {
    const ev = S.app.events.find((e) => e.code === el.value);
    if (!ev) { $("#err").hidden = false; $("#err").textContent = "코드에 해당하는 일정이 없어요. 코드를 다시 확인해 주세요."; return; }
    S.activeId = ev.id; go("joinIdentity");
  };
  el.addEventListener("keydown", (e) => e.key === "Enter" && submit());
  if ($("#back")) $("#back").onclick = () => go("landing");
  $("#ok").onclick = submit;
}

function vJoinIdentity(m) {
  const ev = activeEvent(); if (!ev) return go("joinCode");
  m.innerHTML = `
  <div class="card-box">
    <h2>${esc(ev.title)}</h2>
    <div class="sub">${fmtRange(ev)}
초대받은 이메일로 본인 확인 후 시간표로 이동해요.</div>
    <label class="field"><div class="lbl">이름</div><input id="j-name" value="${esc(S.identity?.name || "")}" placeholder="홍길동"/></label>
    <label class="field"><div class="lbl">이메일</div><input id="j-email" value="${esc(S.identity?.email || "")}" placeholder="email@example.com"/>
      <div class="hint">관리자가 초대 명단에 등록한 이메일과 같아야 해요.</div></label>
    <div class="err" id="err" hidden></div>
    <div class="row"><button class="btn ghost" id="back">뒤로</button><button class="btn primary" id="ok">시간표 열기</button></div>
  </div>`;
  const submit = async () => {
    const name = $("#j-name").value.trim(), em = $("#j-email").value.trim().toLowerCase(), e = $("#err");
    if (!name) { e.hidden = false; e.textContent = "이름을 입력해 주세요."; return; }
    if (!ev.invitees.some((p) => p.email === em)) { e.hidden = false; e.textContent = "이 안건의 초대 명단에 없는 이메일이에요. 초대한 관리자에게 확인해 주세요."; return; }
    await saveIdentity({ role: "participant", name, email: em });
    S.mySlots = new Set(); S.dirty = false; S._slotsLoaded = false; go("grid");
  };
  $("#j-email").addEventListener("keydown", (e) => e.key === "Enter" && submit());
  $("#back").onclick = () => go("joinCode");
  $("#ok").onclick = submit;
}

/* ───────── participant grid ───────── */
function vGrid(m) {
  const ev = activeEvent(); if (!ev || S.identity?.role !== "participant") return go("joinCode");
  m.innerHTML = `
  <button class="back-link" id="back">← 다른 초대 코드 입력</button>
  <div class="pg-head">
    <div>
      <h1>${esc(ev.title)}</h1>
      <div class="range">${fmtRange(ev)}</div>
      ${ev.desc ? `<div class="desc">${esc(ev.desc)}</div>` : ""}
    </div>
    <div class="right">
      <div class="cnt"><b id="sel-cnt">${S.mySlots.size}</b>칸 선택됨 · 내 선택은 나와 관리자만 확인</div>
      <div style="display:flex;gap:8px;justify-content:flex-end">
        <button class="btn ghost sm" id="clear" ${S.mySlots.size ? "" : "disabled"}>모두 지우기</button>
        <button class="btn primary sm" id="save" ${S.dirty ? "" : "disabled"}>희망 시간 저장</button>
      </div>
    </div>
  </div>
  <div class="tip">가능한 시간 칸을 클릭하거나 드래그해서 초록색으로 칠한 뒤, 꼭 <u>저장</u> 버튼을 눌러 주세요.</div>
  <div id="grid-area">${S._slotsLoaded ? gridHTML(ev, { mode: "edit", slotsSet: S.mySlots }) : `<div style="color:var(--gray);padding:30px">내 응답 불러오는 중…</div>`}</div>`;

  $("#back").onclick = () => go("joinCode");
  $("#clear").onclick = () => { S.mySlots = new Set(); S.dirty = true; render(); };
  $("#save").onclick = async () => {
    const btn = $("#save"); btn.disabled = true; btn.textContent = "저장 중…";
    const latest = (await store.get(respKey(ev.id), true)) || {};
    latest[S.identity.email] = { name: S.identity.name, email: S.identity.email, slots: [...S.mySlots], updatedAt: Date.now() };
    const ok = await store.set(respKey(ev.id), latest, true);
    if (ok) { S.dirty = false; toast("희망 시간을 저장했어요 ✓"); } else toast("저장 실패 — 잠시 후 다시 시도해 주세요.");
    render();
  };

  if (!S._slotsLoaded) {
    (async () => {
      const r = await store.get(respKey(ev.id), true);
      const mine = r?.[S.identity.email];
      S.mySlots = new Set(mine?.slots || []); S._slotsLoaded = true;
      if (S.view === "grid") render();
    })();
  } else bindGridEdit(ev);
}

/* ───────── time grid HTML + interactions ───────── */
function gridHTML(ev, { mode, counts, total, hlSet, slotsSet }) {
  const rows = Math.round((ev.hourEnd - ev.hourStart) * 2);
  const startMin = Math.round(ev.hourStart * 60);
  const cols = `60px repeat(${ev.days},1fr)`;
  let h = `<div class="tg-wrap"><div class="tg ${mode}" style="min-width:${60 + ev.days * 74}px">`;
  h += `<div class="r" style="grid-template-columns:${cols}"><div class="h-corner"></div>`;
  for (let di = 0; di < ev.days; di++) {
    const d = addDays(ev.startDate, di), we = d.getDay() === 0 || d.getDay() === 6;
    h += `<div class="h-day ${we ? "we" : ""}"><div class="dow">${DOW[d.getDay()]}</div><div class="dt">${d.getMonth() + 1}/${d.getDate()}</div></div>`;
  }
  h += `</div>`;
  const max = total || 1;
  for (let si = 0; si < rows; si++) {
    const tm = startMin + si * 30, isHr = tm % 60 === 0;
    h += `<div class="r" style="grid-template-columns:${cols}"><div class="t-lab ${isHr ? "hr" : ""}">${isHr ? (tm / 60) + ":00" : ""}</div>`;
    for (let di = 0; di < ev.days; di++) {
      const key = di + "-" + si;
      let cls = "cell" + (isHr ? " hr" : ""), style = "", inner = "";
      if (mode === "edit") { if (slotsSet.has(key)) cls += " sel"; }
      else {
        const c = counts[key] || 0;
        if (c > 0) {
          const a = (0.18 + 0.82 * (c / max)).toFixed(2);
          style = `background:rgba(29,163,106,${a})`;
          inner = `<span style="color:${c / max > 0.45 ? "var(--white)" : "var(--green-dark)"}">${c}</span>`;
        }
        if (hlSet && hlSet.has(key)) cls += " hl";
      }
      h += `<div class="${cls}" data-key="${key}" ${style ? `style="${style}"` : ""}>${inner}</div>`;
    }
    h += `</div>`;
  }
  h += `</div></div>`;
  return h;
}

let dragMode = null;
window.addEventListener("pointerup", () => (dragMode = null));

function bindGridEdit(ev) {
  const area = $("#grid-area"); if (!area) return;
  const setCell = (cell, key, mode) => {
    if (mode === "add") { S.mySlots.add(key); cell.classList.add("sel"); }
    else { S.mySlots.delete(key); cell.classList.remove("sel"); }
    S.dirty = true;
    $("#sel-cnt").textContent = S.mySlots.size;
    $("#save").disabled = false;
    $("#clear").disabled = S.mySlots.size === 0;
  };
  $$(".cell", area).forEach((cell) => {
    const key = cell.dataset.key;
    cell.addEventListener("pointerdown", (e) => {
      e.preventDefault();
      try { cell.releasePointerCapture(e.pointerId); } catch {}
      dragMode = S.mySlots.has(key) ? "remove" : "add";
      setCell(cell, key, dragMode);
    });
    cell.addEventListener("pointerenter", () => { if (dragMode) setCell(cell, key, dragMode); });
  });
}
</script>
