<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>커피챗 타임보드 — 전력전자학회</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800;900&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet" />
<style>
:root{
  --red:#DE2E43; --red-dark:#B01F31; --red-tint:#FDECEE; --red-line:#F6CDD3;
  --ink:#1D1D22; --gray:#6B6B74; --gray-l:#A3A3AC;
  --white:#FFFFFF; --off:#FBF9F9; --line:#ECE7E8;
}
*{box-sizing:border-box}
body{margin:0;background:var(--off);color:var(--ink);font-family:'Noto Sans KR',-apple-system,sans-serif;-webkit-font-smoothing:antialiased}
::selection{background:var(--red-tint)}
button{font-family:inherit}
input,select,textarea{width:100%;padding:10px 12px;font-size:14.5px;font-family:inherit;border:1.5px solid var(--line);border-radius:10px;background:var(--white);color:var(--ink);outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--red);box-shadow:0 0 0 3px var(--red-tint)}
label.field{display:block;margin-bottom:16px}
label.field>.lbl{font-size:12.5px;font-weight:800;color:var(--ink);margin-bottom:6px}
label.field>.hint{font-size:12px;color:var(--gray-l);margin-top:5px}
.btn{font-weight:800;font-size:14.5px;padding:11px 20px;border-radius:10px;border:1.5px solid transparent;cursor:pointer;letter-spacing:-.01em;transition:transform .08s}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn.sm{font-size:13px;padding:7px 14px}
.btn.primary{background:var(--red);color:var(--white)}
.btn.ghost{background:var(--white);color:var(--ink);border-color:var(--line)}
.btn.ghost.red{color:var(--red);border-color:var(--red-line)}
header.top{background:var(--white);border-bottom:1.5px solid var(--line);padding:0 20px;position:sticky;top:0;z-index:20}
header.top .inner{max-width:1060px;margin:0 auto;height:58px;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:baseline;gap:10px;cursor:pointer}
.logo b{font-weight:900;font-size:19px;letter-spacing:-.03em}
.logo b span{color:var(--red)}
.logo small{font-size:11.5px;color:var(--gray-l);font-weight:700}
main{max-width:1060px;margin:0 auto;padding:28px 20px 90px}
main.narrow{max-width:720px}
.card-box{background:var(--white);border:1.5px solid var(--line);border-radius:18px;padding:28px 26px;max-width:460px;margin:26px auto 0}
.card-box h2{margin:0;font-size:20px;font-weight:900;letter-spacing:-.03em}
.card-box .sub{color:var(--gray);font-size:13.5px;line-height:1.65;margin:8px 0 22px;white-space:pre-line}
.row{display:flex;gap:10px;justify-content:flex-end;margin-top:8px}
.err{color:var(--red-dark);font-size:13px;font-weight:700;margin-bottom:12px}
.code-chip{font-family:'IBM Plex Mono',monospace;font-size:13.5px;font-weight:600;letter-spacing:.18em;color:var(--red);background:var(--red-tint);border:1.5px dashed var(--red);border-radius:8px;padding:4px 10px;cursor:pointer;transition:all .15s}
.code-chip.big{font-size:22px;padding:9px 18px}
.code-chip.copied{background:var(--red);color:var(--white)}
.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--white);padding:11px 22px;border-radius:12px;font-size:13.5px;font-weight:700;box-shadow:0 8px 24px rgba(29,29,34,.3);z-index:300;opacity:0;transition:opacity .2s;max-width:90vw;text-align:center}
.toast.show{opacity:1}
.banner{border-radius:12px;padding:10px 16px;font-size:12.5px;font-weight:700;margin-bottom:18px;line-height:1.6;border:1.5px solid}
.banner.ok{background:var(--red-tint);border-color:var(--red-line);color:var(--red-dark)}
.banner.warn{background:#FFF7E8;border-color:#EFDCB0;color:#8A6A1F;font-weight:600}
/* landing */
.hero{padding:44px 0 8px;text-align:center}
.hero .eyebrow{font-size:12px;font-weight:900;color:var(--red);letter-spacing:.16em;margin-bottom:12px}
.hero h1{font-size:34px;font-weight:900;letter-spacing:-.04em;line-height:1.28;margin:0}
.hero p{color:var(--gray);font-size:15px;line-height:1.7;margin:14px auto 0;max-width:480px}
.code-entry{max-width:400px;margin:30px auto 0;background:var(--white);border:1.5px solid var(--line);border-radius:20px;padding:26px 24px;box-shadow:0 14px 40px rgba(222,46,67,.07)}
.code-entry .t{font-size:13px;font-weight:900;margin-bottom:10px}
.admin-link{display:block;text-align:center;margin-top:26px;background:none;border:none;color:var(--gray-l);font-size:12.5px;cursor:pointer;text-decoration:underline;text-underline-offset:3px;width:100%}
/* dash */
.dash-head{display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:20px}
.dash-head h1{font-size:24px;font-weight:900;letter-spacing:-.03em;margin:0}
.dash-head p{color:var(--gray);font-size:13.5px;margin:6px 0 0}
.setting{background:var(--white);border:1.5px solid var(--line);border-radius:14px;padding:13px 18px;margin-bottom:12px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.setting .t{font-size:13px;font-weight:900;white-space:nowrap}
.setting .v{font-size:12.5px;font-weight:600;flex:1;min-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;margin-top:20px}
.ev-card{background:var(--white);border:1.5px solid var(--line);border-top:5px solid var(--red);border-radius:14px;padding:18px;cursor:pointer;transition:box-shadow .15s}
.ev-card:hover{box-shadow:0 8px 22px rgba(222,46,67,.12)}
.ev-card .head{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.ev-card .title{font-size:16.5px;font-weight:800;letter-spacing:-.02em;line-height:1.35}
.ev-card .range{font-size:12.5px;color:var(--gray);margin-top:8px;font-variant-numeric:tabular-nums}
.empty{text-align:center;padding:56px 20px;background:var(--white);border:1.5px dashed var(--line);border-radius:18px;color:var(--gray);font-size:13.5px}
.note{font-size:12px;color:var(--gray-l);line-height:1.7;margin-top:26px}
/* editor */
.editor-wrap{max-width:560px;margin:0 auto}
.editor-wrap h1{font-size:22px;font-weight:900;letter-spacing:-.03em}
.editor-box{background:var(--white);border:1.5px solid var(--line);border-radius:18px;padding:24px 24px 20px;margin-top:14px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
/* detail */
.back-link{background:none;border:none;color:var(--gray);font-size:13px;cursor:pointer;padding:0;margin-bottom:14px}
.detail-hero{background:var(--white);border:1.5px solid var(--line);border-left:6px solid var(--red);border-radius:18px;padding:22px 26px;display:flex;flex-wrap:wrap;gap:16px;align-items:center;justify-content:space-between}
.detail-hero .title{font-size:21px;font-weight:900;letter-spacing:-.03em}
.detail-hero .range{font-size:13px;color:var(--gray);margin-top:6px;font-variant-numeric:tabular-nums}
.detail-hero .desc{font-size:13px;color:var(--gray);margin-top:8px;max-width:520px;line-height:1.6}
.detail-hero .right{display:flex;flex-direction:column;align-items:flex-end;gap:10px}
.detail-hero .cap{font-size:11px;color:var(--gray-l);font-weight:800;letter-spacing:.08em}
section.blk{margin-top:26px}
.blk-head{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:12px}
.blk-head h2{font-size:16.5px;font-weight:900;margin:0}
.pchips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.pchip{font-size:12.5px;font-weight:800;padding:6px 14px;border-radius:20px;cursor:pointer;border:1.5px solid var(--line);background:var(--white);color:var(--ink)}
.pchip.on{border-color:var(--red);background:var(--red);color:var(--white)}
.pchip small{font-weight:700;opacity:.65;margin-left:4px}
.best{margin-top:16px;background:var(--red-tint);border:1.5px solid var(--red-line);border-radius:14px;padding:14px 18px}
.best .t{font-size:12.5px;font-weight:900;color:var(--red-dark);margin-bottom:8px}
.best .items{display:flex;gap:14px;flex-wrap:wrap;font-size:13.5px;font-weight:800}
.best .items b{color:var(--red-dark)}
/* time grid */
.tg-wrap{overflow-x:auto;border-radius:14px;border:1.5px solid var(--line);background:var(--white)}
.tg{user-select:none}
.tg .r{display:grid}
.tg .h-corner{background:var(--ink)}
.tg .h-day{background:var(--ink);color:var(--white);text-align:center;padding:10px 4px 8px;border-left:1px solid #34343C}
.tg .h-day .dow{font-size:11px;font-weight:700;color:#B9B9C2}
.tg .h-day.we .dow{color:#F3A6B0}
.tg .h-day .dt{font-size:15px;font-weight:800;font-variant-numeric:tabular-nums}
.tg .t-lab{background:#2A2A31;color:#B9B9C2;font-size:11px;font-weight:600;font-variant-numeric:tabular-nums;text-align:right;padding:2px 8px 0 0;height:26px}
.tg .t-lab.hr{border-top:1px solid #43434C}
.tg .cell{height:26px;background:var(--white);border-left:1px solid var(--line);border-top:1px dashed #F3EEEF;display:flex;align-items:center;justify-content:center;font-size:10.5px;font-weight:800;font-variant-numeric:tabular-nums}
.tg .cell.hr{border-top:1px solid var(--line)}
.tg.edit .cell{cursor:pointer;touch-action:none}
.tg .cell.sel{background:var(--red)}
.tg .cell.hl{outline:2.5px solid var(--ink);outline-offset:-2.5px}
.tip{background:var(--red-tint);border-radius:12px;padding:10px 16px;font-size:12.5px;color:var(--red-dark);font-weight:700;margin-bottom:14px}
/* participant grid header */
.pg-head{display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:16px}
.pg-head h1{font-size:21px;font-weight:900;letter-spacing:-.03em;margin:0}
.pg-head .range{font-size:13px;color:var(--gray);margin-top:6px;font-variant-numeric:tabular-nums}
.pg-head .right{text-align:right}
.pg-head .cnt{font-size:12px;color:var(--gray);margin-bottom:8px}
.pg-head .cnt b{color:var(--red)}
details.guide summary{font-size:12.5px;color:var(--gray);cursor:pointer;font-weight:800}
details.guide ol{font-size:12.5px;color:var(--gray);line-height:1.9;margin:10px 0 4px;padding-left:20px}
details.guide .fine{font-size:11.5px;color:var(--gray-l);line-height:1.6}
@media (prefers-reduced-motion:reduce){*{transition:none!important}}
@media (max-width:560px){.hero h1{font-size:27px}.grid2{grid-template-columns:1fr}}
</style>
</head>
<body>
<header class="top"><div class="inner">
  <div class="logo" id="logo"><b>커피챗 <span>타임보드</span></b><small>전력전자학회</small></div>
  <div id="hdr-right" style="display:flex;align-items:center;gap:12px"></div>
</div></header>
<main id="main" class="narrow"></main>
<div class="toast" id="toast"></div>

<script>
/* ═════════════════════════════════════════════════════════════════
   ★ 설정 (관리자용) — 이 한 줄만 채우면 준비 끝!
   Firebase 콘솔에서 Realtime Database를 만들고(테스트 모드),
   생성된 주소를 아래 따옴표 안에 붙여넣은 뒤 이 파일을 호스팅하세요.
   예: const EMBEDDED_DB_URL = "https://my-project-default-rtdb.firebaseio.com";
   ═════════════════════════════════════════════════════════════════ */
const EMBEDDED_DB_URL = "";

/* ───────── 저장소: Claude 공유 저장소 ▸ Firebase ▸ localStorage ───────── */
const hasClaude = typeof window.storage === "object" && window.storage && typeof window.storage.get === "function";
(function pickFromHash() { // 링크 뒤 #db=... 로도 DB 주소 전달 가능
  const m = location.hash.match(/[#&]db=([^&]+)/);
  if (m) { try { localStorage.setItem("cc-dburl", decodeURIComponent(m[1])); } catch {} }
})();
let DB_URL = EMBEDDED_DB_URL || (() => { try { return localStorage.getItem("cc-dburl") || ""; } catch { return ""; } })();
DB_URL = DB_URL.trim().replace(/\/+$/, "");
function setDbUrl(u) { DB_URL = (u || "").trim().replace(/\/+$/, ""); try { DB_URL ? localStorage.setItem("cc-dburl", DB_URL) : localStorage.removeItem("cc-dburl"); } catch {} }
const shareMode = () => (hasClaude ? "claude" : DB_URL ? "firebase" : "local");

const ls = {
  get(k) { try { const v = localStorage.getItem("cc-" + k); return v ? JSON.parse(v) : null; } catch { return null; } },
  set(k, v) { try { localStorage.setItem("cc-" + k, JSON.stringify(v)); return true; } catch { return false; } },
  del(k) { try { localStorage.removeItem("cc-" + k); } catch {} },
};
const fbase = { // Firebase RTDB REST — 값은 문자열(JSON)로 저장
  path: (p) => DB_URL + "/coffeechat/" + p + ".json",
  async get(p) {
    try { const r = await fetch(this.path(p)); if (!r.ok) return { ok: false }; const v = await r.json();
      return { ok: true, val: typeof v === "string" ? JSON.parse(v) : v === null ? null : v };
    } catch { return { ok: false }; }
  },
  async put(p, val) {
    try { const r = await fetch(this.path(p), { method: "PUT", body: JSON.stringify(JSON.stringify(val)) }); return r.ok; } catch { return false; }
  },
  async del(p) { try { await fetch(this.path(p), { method: "DELETE" }); } catch {} },
  async test() { const r = await this.get("app"); return r.ok; },
};

const Data = {
  async loadApp() { // { ownerPin, siteUrl, events: [] }
    if (hasClaude) { try { const r = await window.storage.get("app", true); return r ? JSON.parse(r.value) : null; } catch { return null; } }
    if (shareMode() === "firebase") { const r = await fbase.get("app"); return r.ok ? r.val : null; }
    return ls.get("app");
  },
  async saveApp(app) {
    if (hasClaude) { try { return !!(await window.storage.set("app", JSON.stringify(app), true)); } catch { return false; } }
    if (shareMode() === "firebase") return fbase.put("app", app);
    return ls.set("app", app);
  },
  async loadResponses(eid) { // { pid: {name, contact, slots, updatedAt} }
    if (shareMode() === "firebase") {
      const r = await fbase.get("resp/" + eid);
      if (!r.ok || !r.val) return {};
      const map = {};
      for (const [pid, raw] of Object.entries(r.val)) { try { map[pid] = typeof raw === "string" ? JSON.parse(raw) : raw; } catch {} }
      return map;
    }
    if (hasClaude) { try { const r = await window.storage.get("resp-" + eid, true); return r ? JSON.parse(r.value) : {}; } catch { return {}; } }
    return ls.get("resp-" + eid) || {};
  },
  async loadMy(eid, pid) {
    if (shareMode() === "firebase") { const r = await fbase.get("resp/" + eid + "/" + pid); return r.ok ? r.val : null; }
    return (await this.loadResponses(eid))[pid] || null;
  },
  async saveMy(eid, pid, entry) {
    if (shareMode() === "firebase") return fbase.put("resp/" + eid + "/" + pid, entry);
    if (hasClaude) {
      try {
        const r = await window.storage.get("resp-" + eid, true).catch(() => null);
        const m = r ? JSON.parse(r.value) : {}; m[pid] = entry;
        return !!(await window.storage.set("resp-" + eid, JSON.stringify(m), true));
      } catch { return false; }
    }
    const m = ls.get("resp-" + eid) || {}; m[pid] = entry;
    return ls.set("resp-" + eid, m);
  },
  async delResponses(eid) {
    if (shareMode() === "firebase") return fbase.del("resp/" + eid);
    if (hasClaude) { try { await window.storage.delete("resp-" + eid, true); } catch {} return; }
    ls.del("resp-" + eid);
  },
};
const Personal = {
  async get(k) { if (hasClaude) { try { const r = await window.storage.get(k, false); return r ? JSON.parse(r.value) : null; } catch { return null; } } return ls.get(k); },
  async set(k, v) { if (hasClaude) { try { await window.storage.set(k, JSON.stringify(v), false); } catch {} return; } ls.set(k, v); },
};

/* ───────── utils ───────── */
const $ = (s, r) => (r || document).querySelector(s);
const $$ = (s, r) => [...(r || document).querySelectorAll(s)];
const esc = (s) => String(s ?? "").replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
const uid = () => Math.random().toString(36).slice(2, 8) + Date.now().toString(36).slice(-4);
const makeCode = () => { const c = "ABCDEFGHJKMNPQRSTUVWXYZ23456789"; let s = ""; for (let i = 0; i < 6; i++) s += c[(Math.random() * c.length) | 0]; return s; };
const DOW = ["일","월","화","수","목","금","토"];
const addDays = (iso, n) => { const d = new Date(iso + "T00:00:00"); d.setDate(d.getDate() + n); return d; };
const toISO = (d) => d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
const fmtHM = (dec) => Math.floor(dec) + ":" + (dec % 1 ? "30" : "00");
const fmtRange = (ev) => { const a = addDays(ev.startDate, 0), b = addDays(ev.startDate, ev.days - 1);
  return `${a.getMonth()+1}월 ${a.getDate()}일 – ${b.getMonth()+1}월 ${b.getDate()}일 · ${fmtHM(ev.hourStart)}–${fmtHM(ev.hourEnd)}`; };
const slotLabel = (ev, slot) => { const [di, si] = slot.split("-").map(Number); const d = addDays(ev.startDate, di);
  const tm = Math.round(ev.hourStart * 60) + si * 30, h = (tm / 60) | 0, m = tm % 60 ? "30" : "00";
  return `${d.getMonth()+1}/${d.getDate()}(${DOW[d.getDay()]}) ${h}:${m}`; };
let toastTimer;
function toast(msg) { const t = $("#toast"); t.textContent = msg; t.classList.add("show"); clearTimeout(toastTimer); toastTimer = setTimeout(() => t.classList.remove("show"), 2400); }
function copyText(t) { if (navigator.clipboard?.writeText) return navigator.clipboard.writeText(t); return Promise.reject(); }
function participantLink() {
  const base = (S.app.siteUrl || "").trim();
  if (!base) return "";
  return shareMode() === "firebase" && !EMBEDDED_DB_URL ? base + "#db=" + encodeURIComponent(DB_URL) : base;
}

/* ───────── state ───────── */
let S = {
  view: "loading",
  app: { ownerPin: null, siteUrl: "", events: [] },
  identity: null,          // {role:"owner"} | {role:"participant", pid, name, contact}
  activeId: null,
  editing: null,
  resp: null,
  highlightPid: null,
  mySlots: new Set(),
  dirty: false,
  _slotsLoaded: false,
};
const activeEvent = () => S.app.events.find((e) => e.id === S.activeId) || null;

async function saveApp(next) {
  S.app = next;
  const ok = await Data.saveApp(next);
  if (!ok) toast("저장에 실패했어요. 연결 상태를 확인해 주세요.");
  return ok;
}
async function saveIdentity(id) { S.identity = id; await Personal.set("identity", id); }

/* ───────── boot ───────── */
(async function boot() {
  render();
  const [a, id] = await Promise.all([Data.loadApp(), Personal.get("identity")]);
  if (a) S.app = a;
  if (id) S.identity = id;
  S.view = id?.role === "owner" && a?.ownerPin ? "dash" : "landing";
  render();
})();

function go(v) { S.view = v; render(); }
async function logout() { S.identity = null; await Personal.set("identity", null); go("landing"); }

/* ───────── render root ───────── */
function render() {
  const hr = $("#hdr-right");
  if (S.identity?.role === "owner") {
    hr.innerHTML = `<span style="font-size:12.5px;color:var(--gray-l);font-weight:700">관리자</span>
      <button id="btn-logout" class="btn ghost sm">나가기</button>`;
    $("#btn-logout").onclick = logout;
  } else if (S.identity?.role === "participant" && (S.view === "grid" || S.view === "joinName")) {
    hr.innerHTML = `<span style="font-size:12.5px;color:var(--gray-l);font-weight:700">${esc(S.identity.name || "")}</span>`;
  } else hr.innerHTML = "";
  $("#logo").onclick = () => go(S.identity?.role === "owner" ? "dash" : "landing");

  const main = $("#main");
  main.className = ["dash", "detail", "grid"].includes(S.view) ? "" : "narrow";
  const views = { loading: vLoading, landing: vLanding, ownerSetup: vOwnerSetup, ownerLogin: vOwnerLogin,
    dash: vDash, editor: vEditor, detail: vDetail, joinName: vJoinName, grid: vGrid };
  (views[S.view] || vLanding)(main);
}

function vLoading(m) {
  m.innerHTML = `<div style="text-align:center;padding:80px 0;color:var(--gray)">불러오는 중…</div>`;
}

function modeBanner() {
  const m = shareMode();
  if (m === "claude") return "";
  if (m === "firebase") return "";

  $$(".code-chip", root).forEach((el) => el.addEventListener("click", (e) => {

      el.classList.add("copied"); const t = el.textContent; el.textContent = "복사됨 ✓";

    }).catch(() => {});
  }));
}

/* ───────── editor ───────── */
function vEditor(m) {
  if (!S.editing) {
    const init = S._editFromDetail ? activeEvent() : null;
    const today = toISO(new Date());
    S.editing = init
      ? { ...init, endDate: init.endDate || toISO(addDays(init.startDate, init.days - 1)) }
      : { id: uid(), code: makeCode(), title: "", desc: "", startDate: today, endDate: toISO(addDays(today, 4)), days: 5, hourStart: 9, hourEnd: 18, createdAt: Date.now(), _new: true };
  }
  const f = S.editing;
  const timeOpts = (endMode) => Array.from({ length: 48 }, (_, i) => (endMode ? (i + 1) / 2 : i / 2))
    .map((t) => `<option value="${t}" ${t === (endMode ? f.hourEnd : f.hourStart) ? "selected" : ""}>${fmtHM(t)}</option>`).join("");

  m.innerHTML = `
  <div class="editor-wrap">
    <h1>${f._new ? "새 일정 카드" : "일정 카드 수정"}</h1>
    <div class="editor-box">
      <label class="field"><div class="lbl">제목</div><input id="f-title" value="${esc(f.title)}" placeholder="예: 전력전자학회 커피챗 (홍길동)"/></label>
      <label class="field"><div class="lbl">안내 문구 (선택)</div><textarea id="f-desc" style="min-height:64px;resize:vertical" placeholder="예: 포스터 세션 근처 카페에서 30분씩 만나요. 소속/이름을 남겨주세요!">${esc(f.desc)}</textarea></label>
      <div class="grid2">
        <label class="field"><div class="lbl">시작 날짜</div><input type="date" id="f-start" value="${f.startDate}"/></label>
        <label class="field"><div class="lbl">종료 날짜</div><input type="date" id="f-end" value="${f.endDate}" min="${f.startDate}"/></label>
        <label class="field"><div class="lbl">시작 시간</div><select id="f-hs">${timeOpts(false)}</select></label>
        <label class="field"><div class="lbl">종료 시간</div><select id="f-he">${timeOpts(true)}</select></label>
      </div>
      <div class="err" id="err" hidden></div>
      <div class="row"><button class="btn ghost" id="cancel">취소</button><button class="btn primary" id="save">${f._new ? "카드 만들기" : "저장"}</button></div>
    </div>
  </div>`;

  const err = (t) => { const e = $("#err"); e.hidden = !t; e.textContent = t || ""; };
  $("#f-start").addEventListener("change", () => ($("#f-end").min = $("#f-start").value));
  $("#cancel").onclick = () => { S.editing = null; S._editFromDetail = false; go(f._new ? "dash" : "detail"); };
  $("#save").onclick = async () => {
    f.title = $("#f-title").value; f.desc = $("#f-desc").value;
    f.startDate = $("#f-start").value; f.endDate = $("#f-end").value;
    f.hourStart = +$("#f-hs").value; f.hourEnd = +$("#f-he").value;
    if (!f.title.trim()) return err("제목을 입력해 주세요.");
    if (!f.startDate || !f.endDate) return err("시작·종료 날짜를 모두 선택해 주세요.");
    const diff = Math.round((new Date(f.endDate + "T00:00:00") - new Date(f.startDate + "T00:00:00")) / 86400000);
    if (diff < 0) return err("종료 날짜가 시작 날짜보다 빠를 수 없어요.");
    if (diff > 13) return err("기간은 최대 14일까지 설정할 수 있어요.");
    if (f.hourEnd <= f.hourStart) return err("종료 시간이 시작 시간보다 늦어야 해요.");
    const ev = { ...f, title: f.title.trim(), days: diff + 1 }; delete ev._new;
    const exists = S.app.events.some((e) => e.id === ev.id);
    const events = exists ? S.app.events.map((e) => (e.id === ev.id ? ev : e)) : [ev, ...S.app.events];
    if (await saveApp({ ...S.app, events })) {
      S.activeId = ev.id; S.editing = null; S._editFromDetail = false; S.resp = null;
      toast(exists ? "카드를 수정했어요" : "카드를 만들었어요");
      go("detail");
    }
  };
}

/* ───────── owner detail: 응답 취합(관리자 전용 화면) ───────── */
function vDetail(m) {
  const ev = activeEvent();
  if (!ev) return go("dash");
  const responders = S.resp ? Object.entries(S.resp).filter(([, r]) => r?.slots?.length).map(([pid, r]) => ({ pid, ...r })) : [];
  responders.sort((x, y) => (y.updatedAt || 0) - (x.updatedAt || 0));
  const counts = {};
  responders.forEach((r) => r.slots.forEach((s) => (counts[s] = (counts[s] || 0) + 1)));
  const best = Object.entries(counts).sort((a, b) => b[1] - a[1]).slice(0, 3);
  const hl = S.highlightPid && S.resp?.[S.highlightPid] ? new Set(S.resp[S.highlightPid].slots) : null;

  m.innerHTML = `
  <button class="back-link" id="back">← 카드 목록</button>
  <div class="detail-hero">
    <div>
      <div class="title">${esc(ev.title)}</div>
      <div class="range">${fmtRange(ev)}</div>
      ${ev.desc ? `<div class="desc">${esc(ev.desc)}</div>` : ""}
    </div>
    <div class="right">
      <div class="cap">초대 코드 — 이 코드를 공유하세요</div>
      <button class="code-chip big" data-code="${ev.code}">${ev.code}</button>
      <div style="display:flex;gap:8px">
        ${participantLink() ? `<button class="btn ghost sm red" id="copy-link">참여 링크 복사</button>` : ""}

        <button class="btn ghost sm" id="del" style="color:var(--red-dark)">삭제</button>
      </div>
    </div>
  </div>

  <section class="blk">
    <div class="blk-head">
      <h2>희망 시간 취합 <span style="color:var(--red)">${responders.length}</span><span style="color:var(--gray-l);font-weight:700">명</span>
        <span style="font-size:11.5px;color:var(--gray-l);font-weight:700;margin-left:10px">관리자만 보는 화면</span></h2>
      <button class="btn ghost sm" id="refresh">↻ 새로고침</button>
    </div>
    <div id="resp-area">
      ${S.resp === null ? `<div style="color:var(--gray);padding:20px">응답 불러오는 중…</div>`
      : responders.length === 0 ? `<div class="empty">아직 등록된 희망 시간이 없어요. 초대 코드를 공유하고 잠시 후 새로고침해 보세요.</div>`
      : `
      <div class="pchips">
        <button class="pchip ${!S.highlightPid ? "on" : ""}" data-pid="">전체 보기</button>
        ${responders.map((r) => `<button class="pchip ${S.highlightPid === r.pid ? "on" : ""}" data-pid="${esc(r.pid)}" title="${esc(r.contact || "")}">${esc(r.name)}<small>${r.slots.length}칸</small></button>`).join("")}
      </div>
      ${gridHTML(ev, { mode: "heat", counts, total: responders.length, hlSet: hl })}
      ${S.highlightPid && S.resp[S.highlightPid]?.contact ? `<div style="font-size:12.5px;color:var(--gray);margin-top:10px">📇 ${esc(S.resp[S.highlightPid].name)} · ${esc(S.resp[S.highlightPid].contact)}</div>` : ""}
      ${best.length ? `<div class="best"><div class="t">🏆 신청이 몰린 시간 TOP ${best.length}</div>
        <div class="items">${best.map(([s, c]) => `<div>${slotLabel(ev, s)} <b>· ${c}명</b></div>`).join("")}</div></div>` : ""}`}
    </div>
  </section>`;

  bindCodeChips(m);
  $("#back").onclick = () => go("dash");
  $("#edit").onclick = () => { S._editFromDetail = true; S.editing = null; go("editor"); };
  $("#del").onclick = async () => {
    if (!confirm("이 카드를 삭제할까요? 등록된 희망 시간도 함께 사라집니다.")) return;
    await saveApp({ ...S.app, events: S.app.events.filter((e) => e.id !== ev.id) });
    await Data.delResponses(ev.id);
    toast("삭제했어요"); go("dash");
  };
  $("#refresh").onclick = loadResp;
  const cl = $("#copy-link");
  if (cl) cl.onclick = () => copyText(participantLink()).then(() => toast("참여 링크를 복사했어요 ✓")).catch(() => prompt("복사하세요:", participantLink()));
  $$(".pchip", m).forEach((b) => b.addEventListener("click", () => {
    const pid = b.dataset.pid;
    S.highlightPid = pid && S.highlightPid !== pid ? pid : null;
    render();
  }));

  if (S.resp === null) loadResp();
  async function loadResp() { S.resp = await Data.loadResponses(ev.id); if (S.view === "detail") render(); }

    <div class="sub">${fmtRange(ev)}${ev.desc ? "\n" + esc(ev.desc) : ""}</div>
    <label class="field"><div class="lbl">이름</div><input id="j-name" value="${esc(S.identity?.name || "")}" placeholder="홍길동"/></label>
    <label class="field"><div class="lbl">소속 · 연락처 (선택)</div><input id="j-contact" value="${esc(S.identity?.contact || "")}" placeholder="예: ○○대 전력전자연구실 / hong@lab.ac.kr"/>
      <div class="hint">주최자가 연락드릴 때 사용해요. 같은 기기에서 다시 접속하면 내 응답을 이어서 수정할 수 있어요.</div></label>
    <div class="err" id="err" hidden></div>
    <div class="row"><button class="btn ghost" id="back">뒤로</button><button class="btn primary" id="ok">시간표 열기</button></div>
  </div>`;
  const submit = async () => {
    const name = $("#j-name").value.trim(), contact = $("#j-contact").value.trim();
    if (!name) { $("#err").hidden = false; $("#err").textContent = "이름을 입력해 주세요."; return; }
    const pid = S.identity?.pid || uid();
    await saveIdentity({ role: "participant", pid, name, contact });
    S.mySlots = new Set(); S.dirty = false; S._slotsLoaded = false;
    go("grid");
  };
  $("#j-contact").addEventListener("keydown", (e) => e.key === "Enter" && submit());
  $("#j-name").addEventListener("keydown", (e) => e.key === "Enter" && submit());
  $("#back").onclick = () => go("landing");
  $("#ok").onclick = submit;
}

/* ───────── participant grid ───────── */
function vGrid(m) {
  const ev = activeEvent();
  if (!ev || S.identity?.role !== "participant") return go("landing");
  m.innerHTML = `
  <button class="back-link" id="back">← 처음으로</button>
  <div class="pg-head">
    <div>
      <h1>${esc(ev.title)}</h1>
      <div class="range">${fmtRange(ev)}</div>
    </div>
    <div class="right">
      <div class="cnt"><b id="sel-cnt">${S.mySlots.size}</b>칸 선택 · ${esc(S.identity.name)}님의 선택은 주최자만 확인해요</div>
      <div style="display:flex;gap:8px;justify-content:flex-end">
        <button class="btn ghost sm" id="clear" ${S.mySlots.size ? "" : "disabled"}>모두 지우기</button>
        <button class="btn primary sm" id="save" ${S.dirty ? "" : "disabled"}>희망 시간 저장</button>
      </div>
    </div>
  </div>
  <div class="tip">☕ 커피챗이 가능한 시간 칸을 클릭하거나 드래그해서 빨간색으로 칠한 뒤, 꼭 <u>저장</u>을 눌러 주세요.</div>
  <div id="grid-area">${S._slotsLoaded ? gridHTML(ev, { mode: "edit", slotsSet: S.mySlots }) : `<div style="color:var(--gray);padding:30px">내 응답 불러오는 중…</div>`}</div>`;

  $("#back").onclick = () => go("landing");
  $("#clear").onclick = () => { S.mySlots = new Set(); S.dirty = true; render(); };
  $("#save").onclick = async () => {
    const btn = $("#save"); btn.disabled = true; btn.textContent = "저장 중…";
    const ok = await Data.saveMy(ev.id, S.identity.pid, {
      name: S.identity.name, contact: S.identity.contact || "", slots: [...S.mySlots], updatedAt: Date.now(),
    });
    if (ok) { S.dirty = false; toast("희망 시간을 저장했어요 ✓ 학회에서 만나요!"); } else toast("저장 실패 — 연결 상태를 확인하고 다시 시도해 주세요.");
    render();
  };

  if (!S._slotsLoaded) {
    (async () => {
      const mine = await Data.loadMy(ev.id, S.identity.pid);
      S.mySlots = new Set(mine?.slots || []);
      S._slotsLoaded = true;
      if (S.view === "grid") render();
    })();
  } else bindGridEdit();
}

/* ───────── time grid ───────── */
function gridHTML(ev, { mode, counts, total, hlSet, slotsSet }) {
  const rows = Math.round((ev.hourEnd - ev.hourStart) * 2);
  const startMin = Math.round(ev.hourStart * 60);
  const cols = `60px repeat(${ev.days},1fr)`;
  let h = `<div class="tg-wrap"><div class="tg ${mode}" style="min-width:${60 + ev.days * 74}px">`;
  h += `<div class="r" style="grid-template-columns:${cols}"><div class="h-corner"></div>`;
  for (let di = 0; di < ev.days; di++) {
    const d = addDays(ev.startDate, di), we = d.getDay() === 0 || d.getDay() === 6;
    h += `<div class="h-day ${we ? "we" : ""}"><div class="dow">${DOW[d.getDay()]}</div><div class="dt">${d.getMonth() + 1}/${d.getDate()}</div></div>`;
  }
  h += `</div>`;
  const max = total || 1;
  for (let si = 0; si < rows; si++) {
    const tm = startMin + si * 30, isHr = tm % 60 === 0;
    h += `<div class="r" style="grid-template-columns:${cols}"><div class="t-lab ${isHr ? "hr" : ""}">${isHr ? tm / 60 + ":00" : ""}</div>`;
    for (let di = 0; di < ev.days; di++) {
      const key = di + "-" + si;
      let cls = "cell" + (isHr ? " hr" : ""), style = "", inner = "";
      if (mode === "edit") { if (slotsSet.has(key)) cls += " sel"; }
      else {
        const c = counts[key] || 0;
        if (c > 0) {
          const a = (0.16 + 0.84 * (c / max)).toFixed(2);
          style = `background:rgba(222,46,67,${a})`;
          inner = `<span style="color:${c / max > 0.45 ? "var(--white)" : "var(--red-dark)"}">${c}</span>`;
        }
        if (hlSet && hlSet.has(key)) cls += " hl";
      }
      h += `<div class="${cls}" data-key="${key}" ${style ? `style="${style}"` : ""}>${inner}</div>`;
    }
    h += `</div>`;
  }
  h += `</div></div>`;
  return h;
}

let dragMode = null;
window.addEventListener("pointerup", () => (dragMode = null));

function bindGridEdit() {
  const area = $("#grid-area");
  if (!area) return;
  const setCell = (cell, key, mode) => {
    if (mode === "add") { S.mySlots.add(key); cell.classList.add("sel"); }
    else { S.mySlots.delete(key); cell.classList.remove("sel"); }
    S.dirty = true;
    $("#sel-cnt").textContent = S.mySlots.size;
    $("#save").disabled = false;
    $("#clear").disabled = S.mySlots.size === 0;
  };
  $$(".cell", area).forEach((cell) => {
    const key = cell.dataset.key;
    cell.addEventListener("pointerdown", (e) => {
      e.preventDefault();
      try { cell.releasePointerCapture(e.pointerId); } catch {}
      dragMode = S.mySlots.has(key) ? "remove" : "add";
      setCell(cell, key, dragMode);
    });
    cell.addEventListener("pointerenter", () => { if (dragMode) setCell(cell, key, dragMode); });
  });
}
</script>
